<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZYN | Zara Inspired Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading -->
    <div id="loader" style="position:fixed; inset:0; background:#fff; z-index:9999; display:flex; justify-content:center; align-items:center; letter-spacing:5px;">
        LOADING DZYN...
    </div>

    <nav class="navbar">
        <div class="logo">DZYN</div>
        <div class="nav-links">
            <a href="#" data-key="home">الرئيسية</a>
            <a href="#" data-key="clothes">ملابس</a>
            <a href="#" data-key="shoes">أحذية</a>
        </div>
        <div class="nav-left">
            <button id="langBtn" style="background:none; border:1px solid #000; padding:5px 10px; cursor:pointer; font-family:'Montserrat';">FR</button>
        </div>
    </nav>

    <header class="hero">
        <h2 data-key="heroTitle">NEW COLLECTION</h2>
        <p data-key="heroSub">SUMMER / AUTUMN 2024</p>
        <button class="btn-primary" data-key="shopNow" style="background:black; color:white; padding:15px 40px; border:none; cursor:pointer; letter-spacing:2px;">تسوق الآن</button>
    </header>

    <main class="container">
        <h3 class="section-title" data-key="newArrivals">وصلنا حديثاً</h3>
        <div id="productsGrid" class="products-grid">
            <!-- المنتجات تُضاف هنا برمجياً -->
        </div>
    </main>

    <!-- Modal للطلب -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" style="float:left; cursor:pointer;">إغلاق X</span>
            <h3 style="letter-spacing:3px; margin-bottom:30px;" data-key="confirmOrder">تأكيد الطلب</h3>
            <form id="orderForm">
                <p id="selectedProdName" style="font-weight:bold; margin-bottom:20px;"></p>
                <input type="text" id="fullName" placeholder="الاسم الكامل" required>
                <input type="tel" id="phone" placeholder="رقم الهاتف (555...)" required style="direction:ltr;">
                <select id="wilaya" required><option value="">اختر الولاية</option></select>
                <input type="text" id="address" placeholder="العنوان" required>
                <div style="display:flex; gap:10px;">
                    <select id="size" required><option value="">المقاس</option></select>
                    <select id="color" required><option value="">اللون</option></select>
                </div>
                <button type="submit" class="btn-submit" data-key="buyNow">تأكيد الشراء</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
