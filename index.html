<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZYN | Luxury Fashion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">DZYN</div>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">DZYN</div>
            <div class="nav-right">
                <button id="langBtn">FR</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-info">
            <h1 data-key="heroTitle">NEW COLLECTION</h1>
            <p data-key="heroSub">إبداع بلا حدود</p>
        </div>
    </header>

    <main class="main-container">
        <h2 class="section-title" data-key="newArrivals">وصلنا حديثاً</h2>
        <div id="productsGrid" class="products-grid">
            <!-- سيتم حقن المنتجات هنا عبر السكريبت -->
        </div>
    </main>

    <div id="orderModal" class="modal">
        <div class="modal-box">
            <span class="close-modal">إغلاق ×</span>
            <h3 data-key="confirmOrder">تفاصيل الطلب</h3>
            <form id="orderForm">
                <div id="selectedProdName" class="prod-name-display"></div>
                <input type="text" id="fullName" placeholder="الاسم الكامل" required>
                <div class="phone-row">
                    <span class="cc">+213</span>
                    <input type="tel" id="phone" placeholder="555123456" required>
                </div>
                <select id="wilaya" required><option value="">الولاية</option></select>
                <input type="text" id="address" placeholder="العنوان" required>
                <div class="form-row">
                    <select id="size" required><option value="">المقاس</option></select>
                    <select id="color" required><option value="">اللون</option></select>
                </div>
                <button type="submit" class="btn-confirm" data-key="buyNow">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
