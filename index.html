<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZYN | Luxury Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader"><div class="logo-anim">DZYN</div></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">DZYN</div>
            <div class="nav-center">
                <a href="#" data-key="home">الرئيسية</a>
                <a href="#" data-key="clothes">ملابس</a>
                <a href="#" data-key="shoes">أحذية</a>
            </div>
            <div class="nav-left">
                <button id="langBtn">FR</button>
                <button id="cartBtn"><i class="fas fa-shopping-bag"></i></button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h2 id="heroTitle" data-key="heroTitle">NEW COLLECTION</h2>
            <p id="heroSub" data-key="heroSub">اكتشف الفخامة في كل خطوة</p>
            <button class="btn-primary" data-key="shopNow">تسوق الآن</button>
        </div>
    </header>

    <section class="container">
        <h3 class="section-title" data-key="newArrivals">وصلنا حديثاً</h3>
        <div id="productsGrid" class="products-grid">
            <!-- المنتجات ستظهر هنا -->
        </div>
    </section>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 data-key="confirmOrder">تأكيد الطلب</h3>
            <form id="orderForm">
                <p id="selectedProdName" style="margin-bottom:15px; font-weight:bold;"></p>
                <input type="text" id="fullName" data-placeholder="namePlaceholder" placeholder="الاسم الكامل" required>
                <div class="phone-field">
                    <span class="prefix">+213</span>
                    <input type="tel" id="phone" placeholder="555123456" required>
                </div>
                <select id="wilaya" required><option value="">اختر الولاية</option></select>
                <input type="text" id="address" data-placeholder="addressPlaceholder" placeholder="العنوان بالتفصيل" required>
                <div class="input-row">
                    <select id="size" required><option value="">المقاس</option></select>
                    <select id="color" required><option value="">اللون</option></select>
                </div>
                <select id="shipping" required>
                    <option value="Yalidine">Yalidine Express</option>
                    <option value="ZR">ZR Express</option>
                </select>
                <button type="submit" class="btn-submit" data-key="buyNow">تأكيد الشراء</button>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
